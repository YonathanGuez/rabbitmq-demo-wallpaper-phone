# Nginx reverse proxy + static file server
# Runs on port 8080 (non-root) using nginxinc/nginx-unprivileged.
# Config injected via ConfigMap; public/ assets baked into image.
---
apiVersion: image.openshift.io/v1
kind: ImageStream
metadata:
  name: wallpaper-nginx
  labels:
    app: wallpaper-nginx
    app.kubernetes.io/part-of: wallpaper-demo
    app.kubernetes.io/component: frontend
---
apiVersion: build.openshift.io/v1
kind: BuildConfig
metadata:
  name: wallpaper-nginx
  labels:
    app: wallpaper-nginx
    app.kubernetes.io/part-of: wallpaper-demo
    app.kubernetes.io/component: frontend
spec:
  output:
    to:
      kind: ImageStreamTag
      name: wallpaper-nginx:latest
  source:
    type: Binary
  strategy:
    type: Docker
    dockerStrategy:
      dockerfilePath: openshift/Dockerfile.nginx
  # No automatic triggers — builds are started manually:
  # oc start-build bc/wallpaper-nginx --from-dir=. --follow -n wallpaper-demo
  triggers: []
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: wallpaper-nginx-config
  labels:
    app: wallpaper-nginx
    app.kubernetes.io/part-of: wallpaper-demo
data:
  default.conf: |
    server {
        listen 8080;
        server_name localhost;

        root /usr/share/nginx/html;
        index index.html;

        client_max_body_size 100m;

        location / {
            try_files $uri $uri/ /index.html;
        }

        location /upload {
            proxy_pass http://wallpaper-server:3000;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        location /api/ {
            proxy_pass http://wallpaper-server:3000;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        location /wallpapers/ {
            proxy_pass http://wallpaper-server:3000;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        location /socket.io/ {
            proxy_pass http://wallpaper-server:3000;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_read_timeout 300s;
        }
    }
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: wallpaper-nginx
  labels:
    app: wallpaper-nginx
    app.kubernetes.io/part-of: wallpaper-demo
    app.kubernetes.io/component: frontend
  annotations:
    image.openshift.io/triggers: >-
      [{"from":{"kind":"ImageStreamTag","name":"wallpaper-nginx:latest","namespace":"wallpaper-demo"},"fieldPath":"spec.template.spec.containers[?(@.name==\"nginx\")].image","pause":"false"}]
spec:
  replicas: 1
  selector:
    matchLabels:
      app: wallpaper-nginx
  template:
    metadata:
      labels:
        app: wallpaper-nginx
        app.kubernetes.io/part-of: wallpaper-demo
    spec:
      containers:
        - name: nginx
          image: ' '
          imagePullPolicy: Always
          ports:
            - containerPort: 8080
              name: http
          volumeMounts:
            - name: nginx-config
              mountPath: /etc/nginx/conf.d/default.conf
              subPath: default.conf
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 128Mi
          readinessProbe:
            httpGet:
              path: /
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 20
          securityContext:
            allowPrivilegeEscalation: false
            runAsNonRoot: true
            capabilities:
              drop: ["ALL"]
      volumes:
        - name: nginx-config
          configMap:
            name: wallpaper-nginx-config
---
apiVersion: v1
kind: Service
metadata:
  name: wallpaper-nginx
  labels:
    app: wallpaper-nginx
    app.kubernetes.io/part-of: wallpaper-demo
    app.kubernetes.io/component: frontend
spec:
  selector:
    app: wallpaper-nginx
  ports:
    - name: http
      port: 80
      targetPort: 8080
---
# Edge TLS termination — HTTPS at the Route, HTTP inside the cluster.
# HAProxy timeout set to 5m to keep Socket.io WebSocket connections alive.
apiVersion: route.openshift.io/v1
kind: Route
metadata:
  name: wallpaper-nginx
  labels:
    app: wallpaper-nginx
    app.kubernetes.io/part-of: wallpaper-demo
  annotations:
    haproxy.router.openshift.io/timeout: 5m
spec:
  to:
    kind: Service
    name: wallpaper-nginx
  port:
    targetPort: http
  tls:
    termination: edge
    insecureEdgeTerminationPolicy: Redirect

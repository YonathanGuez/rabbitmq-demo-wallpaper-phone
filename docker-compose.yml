services:
  rabbitmq:
    image: rabbitmq:3-management
    hostname: rabbitmq
    user: "0:0"
    ports:
      - "15672:15672"
    environment:
      RABBITMQ_ERLANG_COOKIE: simulation-cookie
    security_opt:
      - label=disable
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  nginx:
    build:
      context: .
      dockerfile: nginx/Dockerfile
    ports:
      - "3000:80"
    depends_on:
      server:
        condition: service_started

  server:
    build: .
    command: node server.js
    expose:
      - "3000"
    environment:
      RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672
      UPLOAD_DIR: /uploads
      PORT: "3000"
    volumes:
      - shared-uploads:/uploads
    depends_on:
      rabbitmq:
        condition: service_healthy

  worker:
    build: .
    command: node worker.js
    # Scale: podman compose up --build -d --scale worker=3
    environment:
      RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672
      SERVER_URL: http://server:3000
      QUEUE_NAME: simulation_queue
      UPLOAD_DIR: /uploads
    volumes:
      - shared-uploads:/uploads
    depends_on:
      rabbitmq:
        condition: service_healthy
      server:
        condition: service_started

volumes:
  shared-uploads:
